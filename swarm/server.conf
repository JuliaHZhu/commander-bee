# NATS Server 配置
# 单机：nats-server -c swarm/server.conf
# 多机：每台机器放一份此配置（修改 listen 和 routes）
#
# 生产环境：加上 authorization 和 TLS
# 内网开发：裸跑即可

server_name: "worker-bee-node-1"
port: 4222
http_port: 8222    # 监控端口（可选）
max_payload: 1MB
max_pending: 10MB

# ── 集群配置（多机时启用）──
cluster {
  name: worker-bee-cluster
  listen: 0.0.0.0:6222

  # 修改为实际 IP
  routes = [
    nats://192.168.1.100:6222   # 机器 A
    nats://192.168.1.101:6222   # 机器 B
    nats://192.168.1.102:6222   # 机器 C
  ]
}

# ── JetStream 持久化引擎 ──
jetstream {
  store_dir: "~/.worker-bee/nats-jetstream"
  max_memory_store: 256MB
  max_file_store: 2GB
}

# ── 日志 ──
debug: false
trace: false
logtime: true
