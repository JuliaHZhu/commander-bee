# NATS Server 配置
# 单机：nats-server -c swarm/server.conf
# 多机：取消注释 cluster 段，填入对端 IP
# 
# 生产环境：加上 authorization 和 TLS
# 内网开发：裸跑即可

port: 4222
http_port: 8222    # 监控端口（可选）

# ── 集群（单机注释掉）─
# cluster {
#   port: 6222
#   routes = [
#     nats://<peer_ip>:6222
#   ]
# }

# ── 日志 ──
debug: false
trace: false
logtime: true

# ── 限制 ──
max_payload: 1MB
max_pending: 10MB
